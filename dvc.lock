schema: '2.0'
stages:
  download_and_extract_osm:
    cmd: wget -c --limit-rate=10M -P data/
      "https://download.geofabrik.de/russia/central-fed-district-latest.osm.pbf"
      && osmium extract --bbox "36.9,55.38,38.0,56.0"
      data/central-fed-district-latest.osm.pbf --output data/map.osm.pbf
    params:
      params.yaml:
        prepare_satellite_data.map_box:
        - 36.9
        - 55.38
        - 38.0
        - 56.0
        prepare_satellite_data.osm: data/map.osm.pbf
    outs:
    - path: data/central-fed-district-latest.osm.pbf
      hash: md5
      md5: 0f7befe6125c570e83aa83aad249c364
      size: 854895678
    - path: data/map.osm.pbf
      hash: md5
      md5: 77e3eff75deeb7215cfae5a8b3d53477
      size: 115296563
  prepare_satellite_data:
    cmd: python scripts/prepare_satellite_data.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 8
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 36.9
          - 55.38
          - 38.0
          - 56.0
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/satellite
      hash: md5
      md5: 65255190bf07a436f15ee4b79eec3448.dir
      size: 9848242577
      nfiles: 8000
  prepare_dataset:
    cmd: python scripts/prepare_dataset.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 8
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 36.9
          - 55.38
          - 38.0
          - 56.0
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/dataset
      hash: md5
      md5: 5e8da2119deab798acdf1c8229134c9e.dir
      size: 136324710400
      nfiles: 1600
