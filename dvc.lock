schema: '2.0'
stages:
  download_and_extract_osm:
    cmd: wget -c --limit-rate=10M -P data/
      "https://download.geofabrik.de/russia/central-fed-district-latest.osm.pbf"
      && osmium extract --bbox "37.38132,55.88128,37.52346,55.95035"
      data/central-fed-district-latest.osm.pbf --output data/map.osm.pbf
    params:
      params.yaml:
        prepare_satellite_data.map_box:
        - 37.38132
        - 55.88128
        - 37.52346
        - 55.95035
        prepare_satellite_data.osm: data/map.osm.pbf
    outs:
    - path: data/central-fed-district-latest.osm.pbf
      hash: md5
      md5: 1258771e16d337ce3951536e48c22133
      size: 857038613
    - path: data/map.osm.pbf
      hash: md5
      md5: fe01b48348c34d2645c2c0cbaf9f7153
      size: 2531885
  prepare_satellite_data:
    cmd: python scripts/prepare_satellite_data.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 4
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 37.38132
          - 55.88128
          - 37.52346
          - 55.95035
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/satellite
      hash: md5
      md5: 63007d51921b224c5beda15701fe262a.dir
      size: 134724645
      nfiles: 100
  prepare_dataset:
    cmd: python scripts/prepare_dataset.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 4
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 37.38132
          - 55.88128
          - 37.52346
          - 55.95035
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/dataset
      hash: md5
      md5: c313ec9ae24710bc7068eebf188290ba.dir
      size: 1838432480
      nfiles: 20
  training:
    cmd: python src/training.py
    params:
      params.yaml:
        training:
          random_seed: 42
          dataset_dir: ${prepare_dataset.dataset_dir}
          dataset_split:
            train: 0.7
            val: 0.15
            test: 0.15
          obj_class: road
          max_workers: 4
          compute_class_balance: true
