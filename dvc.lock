schema: '2.0'
stages:
  download_and_extract_osm:
    cmd: wget -c --limit-rate=10M -P data/
      "https://download.geofabrik.de/russia/central-fed-district-latest.osm.pbf"
      && osmium extract --bbox "36.9,55.38,38.0,56.0"
      data/central-fed-district-latest.osm.pbf --output data/map.osm.pbf
    params:
      params.yaml:
        prepare_satellite_data.map_box:
        - 36.9
        - 55.38
        - 38.0
        - 56.0
        prepare_satellite_data.osm: data/map.osm.pbf
    outs:
    - path: data/central-fed-district-latest.osm.pbf
      hash: md5
      md5: 78529255598dcc6cb3c311d64c78c869
      size: 855496502
    - path: data/map.osm.pbf
      hash: md5
      md5: 2756409c2d046eca1d1e9bbe0447352d
      size: 115338484
  prepare_satellite_data:
    cmd: python scripts/prepare_satellite_data.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 4
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 36.9
          - 55.38
          - 38.0
          - 56.0
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/satellite
      hash: md5
      md5: 3dd5fb3239d2bdf8d78c918e674766a4.dir
      size: 9848127779
      nfiles: 8000
  prepare_dataset:
    cmd: python scripts/prepare_dataset.py
    params:
      params.yaml:
        prepare_satellite_data:
          classes:
          - - road
            - 204
          - - building
            - 255
          - - parking
            - 153
          - - water
            - 102
          - - field
            - 51
          data_dir: data/satellite
          max_workers: 4
          zoom: 17
          num_tiles: 10
          tile_size: 256
          dataset_dir: data/dataset
          map_box:
          - 36.9
          - 55.38
          - 38.0
          - 56.0
          osm: data/map.osm.pbf
          sources:
            google: http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
            bing: http://a0.ortho.tiles.virtualearth.net/tiles/a{}.jpeg?g=2
            arcgis:
              https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
            yandex: https://sat04.maps.yandex.net/tiles?l=sat&x={x}&y={y}&z={z}
    outs:
    - path: data/dataset
      hash: md5
      md5: dec183a583732bf5b530cd63bb95e49d.dir
      size: 147074598400
      nfiles: 1600
